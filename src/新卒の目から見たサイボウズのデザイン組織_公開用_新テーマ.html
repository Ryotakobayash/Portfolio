<p>在宅率：公開されている出社率<mjx-container class="MathJax" jax="SVG"><svg style="vertical-align: 0;" xmlns="http://www.w3.org/2000/svg" width="1.877ex" height="2.021ex" role="img" focusable="false" viewBox="0 -893.3 829.7 893.3"><g stroke="currentColor" fill="currentColor" stroke-width="0" transform="scale(1,-1)"><g data-mml-node="math"><g data-mml-node="msup"><g data-mml-node="mi"></g><g data-mml-node="TeXAtom" transform="translate(33,363) scale(0.707)" data-mjx-texclass="ORD"><g data-mml-node="mo"><path data-c="5B" d="M118 -250V750H255V710H158V-210H255V-250H118Z"></path></g><g data-mml-node="mn" transform="translate(278,0)"><path data-c="31" d="M213 578L200 573Q186 568 160 563T102 556H83V602H102Q149 604 189 617T245 641T273 663Q275 666 285 666Q294 666 302 660V361L303 61Q310 54 315 52T339 48T401 46H427V0H416Q395 3 257 3Q121 3 100 0H88V46H114Q136 46 152 46T177 47T193 50T201 52T207 57T213 61V578Z"></path></g><g data-mml-node="mo" transform="translate(778,0)"><path data-c="5D" d="M22 710V750H159V-250H22V-210H119V710H22Z"></path></g></g></g></g></g></svg></mjx-container>から計算。<br />出社率（各月）=オフィス出社人数平均 ÷ 月末時点の拠点所属人数</p>
<p><img src="../images/%E6%96%B0%E5%8D%92%E3%81%AE%E7%9B%AE%E3%81%8B%E3%82%89%E8%A6%8B%E3%81%9F%E3%82%B5%E3%82%A4%E3%83%9C%E3%82%A6%E3%82%BA%E3%81%AE%E3%83%87%E3%82%B6%E3%82%A4%E3%83%B3%E7%B5%84%E7%B9%94_%E5%90%84%E3%82%AA%E3%83%95%E3%82%A3%E3%82%B9%E3%81%AE%E5%87%BA%E7%A4%BE%E7%8E%87.png" alt="image " /></p>

<header>②リモート中心でも交流できる環境づくり</header>
<h2 id="%E5%85%B7%E4%BD%93%E7%9A%84%E3%81%AA%E5%8F%96%E3%82%8A%E7%B5%84%E3%81%BF-1">具体的な取り組み</h2>
<h3 id="span-classdeco%E5%AF%BE%E9%9D%A2%E9%96%8B%E9%81%8B%E3%81%BE%E3%81%A4%E3%82%8A%E5%A4%8F%E3%83%BB%E5%86%AC-%E5%B9%B4-2-%E5%9B%9Espan"><span class="deco">対面：開運まつり（夏・冬 年 2 回）</span></h3>
<p>全国にいる社員が東京オフィスに集合。<br />
職種混合で行う LT 大会、チームごとに対面で話し合う GatheringDay を三日間に渡って行う。</p>
<h3 id="span-classdeco%E3%83%AA%E3%83%A2%E5%90%8C%E6%9C%9F%E3%82%B3%E3%83%9F%E3%83%A5%E3%83%8B%E3%82%B1%E3%83%BC%E3%82%B7%E3%83%A7%E3%83%B3%E3%81%AE%E6%A9%9F%E4%BC%9Aspan"><span class="deco">リモ：同期コミュニケーションの機会</span></h3>
<p><strong>ざつだん</strong><br />
任意のメンバーで 15 分間の雑談を業務として行う。チーム参加直後は既存メンバー全員とざつだん！</p>
<p><strong>気軽に Slack の huddle で MT</strong><br />
予定を押さえなくても MT をお願いできる文化。</p>
<ul>
<li>対面・ざつだんで<strong>会話のハードルが下がる</strong><img class="animated-emoji" src="https://fonts.gstatic.com/s/e/notoemoji/latest/1f606/512.gif" alt="😆" width="24" height="24" /></li>
<li><img class="animated-emoji" src="https://fonts.gstatic.com/s/e/notoemoji/latest/1f64f/512.gif" alt="🙏" width="24" height="24" />＜「このコンポーネントが欲しかった状況について確認したいです！時間もらえますか？」<br />
リモートでも直接<strong>話しかける感覚で質問できる。</strong></li>
</ul>
<footer>&quot;&quot;</footer>
</section>

</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="17" data-paginate="true" data-footer="&quot;&quot;" data-header="③ デザインシステムチームとの連携" data-theme="cybozu-templatev2" data-marpit-pagination="17" style="--paginate:true;--footer:&quot;&quot;;--header:③ デザインシステムチームとの連携;--theme:cybozu-templatev2;" data-marpit-pagination-total="23">
<header>③ デザインシステムチームとの連携</header>

<h2 id="kintone-design-systemkds%E3%83%81%E3%83%BC%E3%83%A0%E3%81%AE%E7%B4%B9%E4%BB%8B">kintone Design System(kDS)チームの紹介</h2>
<p><span class="deco"><strong>ミッション</strong></span></p>
<p><strong>「kintone についてアウトプットする人たちが、一貫性あるユーザー体験とデザインの品質を、ユーザーに提供できる状態をつくる」</strong></p>
<p><span class="deco"><strong>現場提供しているリソース</strong></span></p>
<ul>
<li>ガイドラインドキュメント</li>
<li>コントリビューションガイドラインドキュメント</li>
<li>React コンポーネントライブラリ</li>
<li>Figma コンポーネントライブラリ</li>
<li>React/Figma 共通コンポーネントドキュメント</li>
<li>デザイントークン</li>
<li>アイコンライブラリ</li>
</ul>
<footer>&quot;&quot;</footer>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="18" data-paginate="true" data-footer="&quot;&quot;" data-header="③ デザインシステムチームとの連携" data-theme="cybozu-templatev2" data-marpit-pagination="18" style="--paginate:true;--footer:&quot;&quot;;--header:③ デザインシステムチームとの連携;--theme:cybozu-templatev2;" data-marpit-pagination-total="23">

<p><img src="../images/%E6%96%B0%E5%8D%92%E3%81%AE%E7%9B%AE%E3%81%8B%E3%82%89%E8%A6%8B%E3%81%9F%E3%82%B5%E3%82%A4%E3%83%9C%E3%82%A6%E3%82%BA%E3%81%AE%E3%83%87%E3%82%B6%E3%82%A4%E3%83%B3%E7%B5%84%E7%B9%94_MCPserver.png" alt="新卒の目から見たサイボウズのデザイン組織_MCPserver" style="width:auto;height:550px;" /></p>

<div class="columns">
<div class="column">
<h3 id="span-classdeco%E2%91%A0-kds-%E8%B3%AA%E5%95%8F%E7%9B%B8%E8%AB%87%E7%AE%B1%E3%81%AB%E6%8A%95%E7%A8%BFspan"><span class="deco">① kDS 質問相談箱に投稿</span></h3>
<p><img src="../images/%E6%96%B0%E5%8D%92%E3%81%AE%E7%9B%AE%E3%81%8B%E3%82%89%E8%A6%8B%E3%81%9F%E3%82%B5%E3%82%A4%E3%83%9C%E3%82%A6%E3%82%BA%E3%81%AE%E3%83%87%E3%82%B6%E3%82%A4%E3%83%B3%E7%B5%84%E7%B9%94_%E8%B3%AA%E5%95%8F%E7%AE%B1.png" alt="" style="width:350px;height:auto;" /></p>

<h3 id="span-classdeco%E2%91%A1-%E8%B3%AA%E5%95%8F-%E2%86%92-%E5%9B%9E%E7%AD%94--%E7%9B%B8%E8%AB%87-%E2%86%92mtspan"><span class="deco">② 質問 → 回答 / 相談 →MT</span></h3>
<ul>
<li>必要になった背景</li>
<li>解決したい課題</li>
<li>担当決め
<ul>
<li>デザイン</li>
<li>ドキュメント</li>
<li>実装</li>
</ul>
</li>
<li>kDS に取り込む流れ</li>
</ul>
</div>
<div class="column">
<h3 id="span-classdeco%E2%91%A2-%E3%82%BF%E3%82%B9%E3%82%AF%E5%8C%96span"><span class="deco">③ タスク化</span></h3>
<p><img src="../images/%E6%96%B0%E5%8D%92%E3%81%AE%E7%9B%AE%E3%81%8B%E3%82%89%E8%A6%8B%E3%81%9F%E3%82%B5%E3%82%A4%E3%83%9C%E3%82%A6%E3%82%BA%E3%81%AE%E3%83%87%E3%82%B6%E3%82%A4%E3%83%B3%E7%B5%84%E7%B9%94_GitHub.png" alt="" style="width:350px;height:auto;" /></p>
<p><span class="positive">助かりポイント</span><br />
タスクの起こり〜実装までの情報をしっかり残せる。<br />
<strong>→ 期間が空いて着手することになっても情報をたどりやすい</strong></p>
</div>
</div>
<footer>&quot;&quot;</footer>

<header>最後に</header>

<p><span class="positive"><strong>半年の感想</strong></span></p>
<ul>
<li>先輩方が築いてくれた環境のおかげで今日まで来れたことを実感。<strong>環境のありがたさを感じた。</strong></li>
<li>環境を活かすために<strong>工夫が必要な場合も多く、まだまだ改善の余地がありそう。</strong></li>
</ul>
<p><span class="positive"><strong>今後の話</strong></span><br />
サイボウズの組織構造はかなり柔軟。大規模に変遷してきた変更の歴史があり、これからも変わる。</p>
<ul>
<li>2019.2 <a href="https://blog.cybozu.io/entry/2019/02/13/080000">組織変更したら部長がいなくなりました - Cybozu Inside Out</a></li>
<li>2022.11 <a href="https://blog.cybozu.io/entry/2022/11/04/173000">マネージャー、いないと無理だったので、またつくりました - Cybozu Inside Out</a></li>
<li>2025.1 <a href="https://insights.amana.jp/article/43224/">なぜサイボウズはデザイン組織を再編したのか？ デザインは誰がつくるのか？</a></li>
<li>2025.8~ ？？？？？</li>
</ul>
<p><strong>組織の改善に貢献できるように準備しておく必要がありそう。</strong></p>
<p><span class="positive">→ 現状をきちんと知ること。なんとなくで参加しないこと。<br />→ 他社事例をチェックして自社の取り組みを俯瞰して見られるようにしておくこと。</span>　<strong>これらが重要</strong></p>
<footer>&quot;&quot;</footer>
</section>
